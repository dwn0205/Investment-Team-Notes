kind = "web"
previewPath = "/"
title = "Investment Team Notes"
version = "1.0.0"
id = "artifacts/investment-notes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25562

[services.development]
run = "pnpm --filter @workspace/investment-notes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/investment-notes", "run", "build" ]
publicDir = "artifacts/investment-notes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25562"
BASE_PATH = "/"
